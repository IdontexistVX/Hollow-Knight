<!-- VIDEO FIX
     Patches _JS_Video_Create in hktruffled.framework.js after it loads.
     Unity calls _JS_Video_Create(url) with the embedded asset path like
     "Assets/VideoClip/Prologue.webm". We redirect that to our GitHub CDN.
     We also keep the sharedassets fallback and play() error handler.
-->
<script>
(function() {
    var LOG = '[VideoFix]';
    var CDN = 'https://cdn.jsdelivr.net/gh/IdontexistVX/Hollow-Knight@main/Endings/';

    function getFilename(url) {
        return String(url).replace(/\\/g, '/').split('/').pop().split('?')[0];
    }

    function isVideoUrl(url) {
        var u = String(url).toLowerCase();
        return u.indexOf('.webm') !== -1 || u.indexOf('.mp4') !== -1 || u.indexOf('.ogv') !== -1;
    }

    // --- 1. fetch() intercept for sharedassets 404s ---
    var _origFetch = window.fetch;
    window.fetch = function(input, init) {
        var url = typeof input === 'string' ? input : (input && input.url ? input.url : '');
        if (url.indexOf('sharedassets') !== -1 && url.indexOf('.resource') !== -1) {
            return _origFetch.apply(window, arguments)
                .then(function(resp) {
                    if (!resp.ok) {
                        console.log(LOG + ' sharedassets ' + resp.status + ' -> returning empty');
                        return new Response(new Uint8Array(0), { status: 200, headers: { 'Content-Type': 'application/octet-stream' } });
                    }
                    return resp;
                }).catch(function() {
                    return new Response(new Uint8Array(0), { status: 200, headers: { 'Content-Type': 'application/octet-stream' } });
                });
        }
        return _origFetch.apply(window, arguments);
    };

    // --- 2. Patch _JS_Video_Create after framework loads ---
    // The framework defines _JS_Video_Create as a closure with videoInstances.
    // We intercept it via Module after the loader script runs.
    // We hook into createUnityInstance to install our patch at the right time.
    var _origCreateUnityInstance = window.createUnityInstance;
    function installVideoPatches() {
        // Wait for _JS_Video_Create to exist on the asmLibraryArg binding
        // by patching the global videoInstances mechanism via prototype
        var _origCreateEl = document.createElement.bind(document);
        document.createElement = function(tag) {
            var el = _origCreateEl(tag);
            if (typeof tag === 'string' && tag.toLowerCase() === 'video') {
                // Intercept src setter to redirect Unity video URLs to CDN
                var _src = '';
                Object.defineProperty(el, 'src', {
                    get: function() { return _src; },
                    set: function(val) {
                        if (val && isVideoUrl(val)) {
                            var filename = getFilename(val);
                            var cdnUrl = CDN + filename;
                            console.log(LOG + ' redirecting video src: ' + filename + ' -> CDN');
                            _src = cdnUrl;
                            el.setAttribute('src', cdnUrl);
                        } else {
                            _src = val;
                            if (val) el.setAttribute('src', val);
                        }
                    },
                    configurable: true
                });

                // Fallback: if video errors or stalls, fire ended so Unity moves on
                el.addEventListener('error', function() {
                    console.log(LOG + ' video error on ' + getFilename(_src) + ' -> firing ended');
                    setTimeout(function() { el.dispatchEvent(new Event('ended')); }, 0);
                });
                el.addEventListener('stalled', function() {
                    setTimeout(function() { el.dispatchEvent(new Event('ended')); }, 500);
                });
                el.addEventListener('suspend', function() {
                    if (el.readyState < 3) {
                        setTimeout(function() {
                            if (el.readyState < 3) {
                                console.log(LOG + ' video stalled -> firing ended');
                                el.dispatchEvent(new Event('ended'));
                            }
                        }, 1500);
                    }
                });
            }
            return el;
        };
        console.log(LOG + ' Video src redirect patch installed.');
    }

    // Install immediately - createElement patch must be in place before Unity creates videos
    installVideoPatches();

    // --- 3. play() error handler ---
    var _origPlay = HTMLVideoElement.prototype.play;
    HTMLVideoElement.prototype.play = function() {
        var v = this;
        var r = _origPlay.call(v);
        if (r && typeof r.then === 'function') {
            return r.catch(function(err) {
                console.log(LOG + ' play() rejected (' + err.message + ') -> firing ended');
                setTimeout(function() { v.dispatchEvent(new Event('ended')); }, 0);
            });
        }
        return r;
    };

    console.log(LOG + ' All patches installed.');
})();
</script>
